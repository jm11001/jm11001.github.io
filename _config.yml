#theme: jekyll-theme-minimal
#theme: jekyll-theme-cayman
title: My Log -  jm11001.github.io
name: 튼튼이
description : 나의 기록

remote_theme: "mmistakes/minimal-mistakes"
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

minimal_mistakes_skin: "default"

search: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

collections:
  pages:
    output: true
    permalink: /:path/
